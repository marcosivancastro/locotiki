<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LocoTiki — Novelas Visuales & Narrativa</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg-base:      #080b12;
      --bg-layer:     #0d1220;
      --bg-card:      #111827;
      --bg-card-alt:  #0f1a2e;
      --accent-brand: #00bf62; /* Tu verde oficial */
      --accent-teal:  #2dd4bf;
      --text-primary: #e8e0d4;
      --text-muted:   #7a8499;
      --border:       rgba(0, 191, 98, 0.18);
      --font-display: 'Cinzel', serif;
      --font-body:    'Lora', serif;
      --font-mono:    'JetBrains Mono', monospace;
      --transition:   0.3s cubic-bezier(0.4,0,0.2,1);
    }

    /* Reset y Estética VN */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      background-color: var(--bg-base);
      color: var(--text-primary);
      line-height: 1.7;
      overflow-x: hidden;
    }

    /* Animación de máscara flotando */
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    
    /* Navbar */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2rem; background: rgba(8,11,18,0.85); backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .nav-logo { font-family: var(--font-display); font-weight: 900; color: var(--accent-brand); text-decoration: none; font-size: 1.2rem; }
    .nav-links { display: flex; gap: 1.8rem; list-style: none; }
    .nav-links a { font-family: var(--font-mono); font-size: 0.72rem; text-transform: uppercase; color: var(--text-muted); text-decoration: none; transition: var(--transition); }
    .nav-links a:hover { color: var(--accent-brand); }

    /* Hero */
    #hero {
      min-height: 100svh; display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 7rem 1.5rem 4rem; position: relative;
    }
    .hero-image-container img {
      width: 160px; height: auto; animation: float 4s ease-in-out infinite;
      filter: drop-shadow(0 0 25px rgba(0, 191, 98, 0.4));
    }
    .hero-logo { font-family: var(--font-display); font-weight: 900; font-size: clamp(3.5rem, 12vw, 8rem); color: var(--text-primary); }
    .hero-logo span { color: var(--accent-brand); text-shadow: 0 0 30px rgba(0, 191, 98, 0.5); }
    .hero-subtitle { font-family: var(--font-display); letter-spacing: 0.3em; text-transform: uppercase; color: var(--accent-brand); font-weight: 700; margin-top: 0.5rem; }

    /* Redes Sociales */
    .social-links { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-top: 2.5rem; }
    .social-btn {
      display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.65rem 1.4rem; border-radius: 8px;
      font-family: var(--font-mono); font-size: 0.78rem; font-weight: 700; text-decoration: none; transition: var(--transition);
      border: 1px solid rgba(255,255,255,0.1); color: #fff; background: rgba(255,255,255,0.03);
    }
    .social-btn:hover { transform: translateY(-3px); border-color: var(--accent-brand); box-shadow: 0 0 15px var(--accent-brand); }
    .social-btn.youtube:hover { color: #ff6b6b; border-color: #ff6b6b; }

    /* Tabla y Secciones */
    section { padding: 6rem 1.5rem; }
    .container { max-width: 1100px; margin: 0 auto; }
    .section-title { font-family: var(--font-display); font-size: 2.5rem; margin-bottom: 2rem; }
    .section-title span { color: var(--accent-brand); }

    .tier-controls { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 2rem; }
    .tier-filter-btn {
      padding: 0.5rem 1rem; border-radius: 100px; border: 1px solid var(--border);
      background: transparent; color: var(--text-muted); cursor: pointer; transition: var(--transition); font-family: var(--font-mono); font-size: 0.7rem;
    }
    .tier-filter-btn.active, .tier-filter-btn:hover { border-color: var(--accent-brand); color: var(--accent-brand); background: rgba(0, 191, 98, 0.05); }

    .tier-table-wrapper { overflow-x: auto; border-radius: 16px; border: 1px solid var(--border); background: var(--bg-layer); }
    .tier-table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
    .tier-table td, .tier-table th { padding: 1.2rem; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.04); }
    
    .status-pill { padding: 0.25rem 0.7rem; border-radius: 100px; font-family: var(--font-mono); font-size: 0.65rem; font-weight: 700; }
    .status-done { background: rgba(0, 191, 98, 0.1); color: var(--accent-brand); }
    .status-ongoing { background: rgba(251,191,36,0.1); color: #fbbf24; }
    .status-pending { background: rgba(148,163,184,0.1); color: #94a3b8; }

    /* Animaciones de aparición */
    .reveal { opacity: 0; transform: translateY(20px); transition: 0.6s ease; }
    .reveal.visible { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

  <nav>
    <a href="#" class="nav-logo">LocoTiki</a>
    <ul class="nav-links">
      <li><a href="#tierlist">Database</a></li>
      <li><a href="#playlists">Playlists</a></li>
      <li><a href="https://myanimelist.net/profile/LocoTiki" target="_blank">MAL</a></li>
    </ul>
  </nav>

  <section id="hero">
    <div class="hero-image-container" style="margin-bottom: 2rem;">
      <img src="images.jfif" alt="Máscara LocoTiki">
    </div>
    <h1 class="hero-logo">Loco<span>Tiki</span></h1>
    <p class="hero-subtitle">Let's Plays · Narrativa · Visual Novels</p>

    <div class="social-links">
      <a href="https://youtube.com/@LocoTiki" target="_blank" class="social-btn youtube"><i class="fab fa-youtube"></i> YouTube</a>
      <a href="https://twitter.com/marcoscastrolt" target="_blank" class="social-btn"><i class="fab fa-x-twitter"></i> Twitter</a>
      <a href="https://instagram.com/locotiki_" target="_blank" class="social-btn"><i class="fab fa-instagram"></i> Instagram</a>
      <a href="https://myanimelist.net/profile/LocoTiki" target="_blank" class="social-btn"><i class="fas fa-list"></i> MAL</a>
    </div>
  </section>

  <section id="tierlist">
    <div class="container">
      <h2 class="section-title">Visual Novel <span>Database</span></h2>
      <div class="tier-controls reveal">
        <button class="tier-filter-btn active" data-filter="all">Todas</button>
        <button class="tier-filter-btn" data-filter="Corta">⏳ Cortas</button>
        <button class="tier-filter-btn" data-filter="Media">⏳ Medias</button>
        <button class="tier-filter-btn" data-filter="Larga">⏳ Largas</button>
        <button class="tier-filter-btn" data-filter="Terminada">✓ Terminadas</button>
        <button class="tier-filter-btn" data-filter="En curso">▶ En curso</button>
        <button class="tier-filter-btn" data-filter="Dropeada">✕ Dropeadas</button>
      </div>
      <div class="tier-table-wrapper reveal">
        <table class="tier-table">
          <thead>
            <tr><th>Tiempo</th><th>Título</th><th>Puntaje</th><th>Estado</th><th>Enlace</th></tr>
          </thead>
          <tbody id="vnTableBody"></tbody>
        </table>
      </div>
    </div>
  </section>

  <script>
    const vnData = [
      // --- LARGAS ---
      { title: "Danganronpa 2: Goodbye Despair", duration: "Larga", score: 5, status: "Terminada", playlist: "https://www.youtube.com/playlist?list=PLIuJCbWely6hNmprOWDfzKIKz-j_Uwb_w" },
      { title: "Danganronpa: Trigger Happy Havoc", duration: "Larga", score: 5, status: "Terminada", playlist: "https://www.youtube.com/playlist?list=PLIuJCbWely6iKFa4TrKXohdapO0gtDJ8q" },
      { title: "Phoenix Wright: Ace Attorney", duration: "Larga", score: 5, status: "Terminada", playlist: "https://www.youtube.com/playlist?list=PLIuJCbWely6jtTfWjqMrCl7xsLK_IP0w4" },
      { title: "PW: Trials and Tribulations", duration: "Larga", score: 5, status: "Terminada", playlist: "https://www.youtube.com/playlist?list=PLIuJCbWely6i8eCbJUfn-d9dqw2IitQb_" },
      { title: "Apollo Justice: Ace Attorney", duration: "Larga", score: 4, status: "Terminada", playlist: "https://www.youtube.com/playlist?list=PLIuJCbWely6gvV-ZihyqY0I4fTUGVfUjZ" },
      { title: "Kara no Shoujo", duration: "Larga", score: 5, status: "Terminada", playlist: "https://www.youtube.com/playlist?list=PLIuJCbWely6hruJrMKaKzKiE3NW_5uKEb" },
      { title: "Chaos;Head Noah", duration: "Larga", score: 5, status: "Terminada", playlist: "https://www.youtube.com/playlist?list=PLIuJCbWely6gQYvS6d68wsBurTtxHYR_L" },
      { title: "Zero Escape: Virtue's Last Reward", duration: "Larga", score: 5, status: "Terminada", playlist: "https://www.youtube.com/playlist?list=PLIuJCbWely6gCJ157trYJifVN1ixn8sS-" },
      { title: "Zero Escape: 999", duration: "Larga", score: 5, status: "Terminada", playlist: "https://www.youtube.com/playlist?list=PLIuJCbWely6jdvMw2nhP3BcfZ6xiiHhEg" },
      { title: "The Walking Dead (Telltale)", duration: "Larga", score: 5, status: "Terminada", playlist: "https://www.youtube.com/playlist?list=PLIuJCbWely6ifaFZ69fzVbixIraRcWylS" },
      { title: "Umineko Chiru", duration: "Larga", score: 5, status: "En curso", playlist: "https://www.youtube.com/playlist?list=PLIuJCbWely6g1z1KZocSkFbkYcc1cEc2g" },
      { title: "Himawari - The Sunflower -", duration: "Larga", score: 4, status: "En curso", playlist: "https://www.youtube.com/playlist?list=PLIuJCbWely6g1z1KZocSkFbkYcc1cEc2g" },
      
      // --- MEDIAS ---
      { title: "PW: Justice For All", duration: "Media", score: 4, status: "Terminada", playlist: "https://www.youtube.com/playlist?list=PLIuJCbWely6iaYnvBSLlmfIOXmqxQOP2a" },
      { title: "Ace Attorney Investigations", duration: "Media", score: 4, status: "En curso", playlist: "https://www.youtube.com/playlist?list=PLIuJCbWely6i_3ZcjGvLrGmasBWC9JEJZ" },
      { title: "It Takes Two", duration: "Media", score: 5, status: "Terminada", playlist: "https://www.youtube.com/playlist?list=PLIuJCbWely6jTsD9ft89a9OW_Ao0BNDay" },
      { title: "Resident Evil 6", duration: "Media", score: 3, status: "Terminada", playlist: "https://www.youtube.com/playlist?list=PLIuJCbWely6gzOzaSVcVO_E7CWWjLDdFp" },
      { title: "Urban Myth Dissolution Center", duration: "Media", score: 4, status: "Terminada", playlist: "https://www.youtube.com/playlist?list=PLIuJCbWely6hmf-XkuXRtqK1UjuunPUvC" },
      { title: "Beyond Two Souls", duration: "Media", score: 3, status: "Dropeada", playlist: "https://www.youtube.com/playlist?list=PLIuJCbWely6hirImN03rVFyG-0YoXXley" },

      // --- CORTAS ---
      { title: "Martial Law", duration: "Corta", score: 4, status: "Terminada", playlist: "https://www.youtube.com/playlist?list=PLIuJCbWely6iuIU4uttoXb908-Ji4IMYb" },
      { title: "Little Nightmares", duration: "Corta", score: 5, status: "Terminada", playlist: "https://www.youtube.com/playlist?list=PLIuJCbWely6hOXBNbaMbtsYq896e8lCrG" },
      { title: "Sakura Swim Club", duration: "Corta", score: 3, status: "Terminada", playlist: "https://www.youtube.com/playlist?list=PLIuJCbWely6hbkxQaosgjHPoIh2HpKMPt" },
      { title: "Shiny Days (Gemelas)", duration: "Corta", score: 3, status: "Terminada", playlist: "https://www.youtube.com/playlist?list=PLIuJCbWely6jQYXE9DvssoQQmk2imNOTt" },
      { title: "Narcissu", duration: "Corta", score: 4, status: "Terminada", playlist: "https://www.youtube.com/playlist?list=PLIuJCbWely6jDodhaU1InEr41XqHHqOue" },
      { title: "One Thousand Lies", duration: "Corta", score: 3, status: "Dropeada", playlist: "https://www.youtube.com/playlist?list=PLIuJCbWely6iVZntSIRvdNSe0EsKKVbBT" },
      { title: "Mad Father", duration: "Corta", score: 4, status: "Dropeada", playlist: "https://www.youtube.com/playlist?list=PLIuJCbWely6hyAmDaOEYBozA1iJ22f5Lc" },
      { title: "Island Existence (YTTD)", duration: "Corta", score: 4, status: "En curso", playlist: "https://www.youtube.com/playlist?list=PLIuJCbWely6j1um7tF8SKTOCauqLu4Sed" },
      { title: "Tomboy", duration: "Corta", score: 3, status: "En curso", playlist: "https://www.youtube.com/playlist?list=PLIuJCbWely6joQk4bRf0pJsfqH-WhlwiN" }
    ];

    function renderTable(filter = "all") {
      const tbody = document.getElementById("vnTableBody");
      const filtered = vnData.filter(vn => {
        if (filter === "all") return true;
        if (["Corta", "Media", "Larga"].includes(filter)) return vn.duration === filter;
        return vn.status === filter;
      });
      tbody.innerHTML = filtered.map(vn => {
        const statusClass = { "Terminada": "status-done", "En curso": "status-ongoing", "Dropeada": "status-pending" }[vn.status] || "status-pending";
        return `<tr>
          <td><span class="status-pill ${statusClass}">${vn.duration}</span></td>
          <td style="font-weight:600">${vn.title}</td>
          <td style="color:var(--accent-brand)">${"⭐".repeat(vn.score)}</td>
          <td><span class="status-pill ${statusClass}">${vn.status}</span></td>
          <td><a href="${vn.playlist}" target="_blank" style="color:var(--accent-brand); text-decoration:none; font-weight:700">Ver →</a></td>
        </tr>`;
      }).join("");
    }

    document.querySelectorAll(".tier-filter-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tier-filter-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        renderTable(btn.dataset.filter);
      });
    });

    const revealObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => { if (entry.isIntersecting) { entry.target.classList.add("visible"); } });
    }, { threshold: 0.1 });
    document.querySelectorAll(".reveal").forEach(el => revealObserver.observe(el));

    renderTable();
  </script>
</body>
</html>
